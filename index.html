<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlobalRates</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1F2937;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
    }

    .logo {
      width: 110px;
      height: 110px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 44px;
      margin: 0;
      letter-spacing: -1px;
    }

    p {
      color: #9ca3af;
      font-size: 16px;
      margin-top: 12px;
      line-height: 1.5;
    }

    .links {
      margin-top: 32px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      background: #111;
      color: #F3F4F6;
      border: 1px solid #1f1f1f;
      transition: 0.2s ease;
      font-size: 14px;
    }

    a:hover {
      border-color: #F3F4F6;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #6b7280;
    }

    .email {
      margin-top: 40px;
    }

    .email a {
      color: #F3F4F6;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="./GRIconTransparent.png" class="logo" alt="GlobalRates Logo" />

    <h1>GlobalRates</h1>

    <p>
      Real-time currency conversion with clean design and live exchange rates.
      Built for travelers and global users.
    </p>

    <div class="links">
        <a href="/GlobalRates-site/privacy-policy.html">Privacy Policy</a>
        <a href="/GlobalRates-site/terms-of-service.html">Terms of Service</a>
    </div>

    <div class="footer">
      © 2026 GlobalRates
      <div class="email">
        <a href="mailto:teamtaptonic@gmail.com">teamtaptonic@gmail.com</a>
      </div>
    </div>

  </div>

</body>
</html>
